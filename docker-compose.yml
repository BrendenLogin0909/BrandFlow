services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brandflow
      POSTGRES_PASSWORD: brandflow
      POSTGRES_DB: brandflow
    ports:
      # host 5433: a native PostgreSQL service occupies 5432 on this machine
      - "5433:5432"
    volumes:
      # distinct name: brandflow_pgdata belongs to an older stack on this machine
      - pgdata_v2:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata_v2:
  miniodata:
