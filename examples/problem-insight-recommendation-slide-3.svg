  <text id="00000000-0000-4000-8000-00000000004b" data-name="caption" data-role="caption" opacity="1" text-anchor="start" font-family="Arial" font-size="26" font-weight="700" font-style="normal" fill="#1a3c8f">
    <tspan x="290" y="204.05">THE INSIGHT</tspan>
  </text>
  <text id="00000000-0000-4000-8000-00000000004c" data-name="headline" data-role="headline" opacity="1" text-anchor="start" font-family="Arial" font-size="60" font-weight="700" font-style="normal" fill="#101418">
    <tspan x="100" y="454">Audiences follow opinions,</tspan>
    <tspan x="100" dy="72">not logos</tspan>
  </text>
  <text id="00000000-0000-4000-8000-00000000004d" data-name="body" data-role="body" opacity="1" text-anchor="start" font-family="Arial" font-size="34" font-weight="400" font-style="normal" fill="#101418">
    <tspan x="100" y="714.85">The accounts that grow take positions and</tspan>
    <tspan x="100" dy="49.3">defend them consistently.</tspan>
  </text>
  <text id="00000000-0000-4000-8000-00000000004e" data-name="caption" data-role="caption" opacity="1" text-anchor="end" font-family="Arial" font-size="24" font-weight="400" font-style="normal" fill="#1a3c8f">
    <tspan x="980" y="122.2">3 / 5</tspan>
  </text>
