  <g id="00000000-0000-4000-8000-00000000004a" data-name="icon:lightbulb" data-role="icon" opacity="1" data-icon="lucide/lightbulb">
    <rect x="137" y="167" width="76" height="76" rx="15.200000000000001" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="175" y="205" text-anchor="middle" dominant-baseline="middle" font-size="10.64" fill="#ffffff">lightbulb</text>
