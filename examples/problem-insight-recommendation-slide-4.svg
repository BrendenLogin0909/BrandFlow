    <tspan x="290" y="204.05">WHAT TO DO</tspan>
  </text>
  <text id="00000000-0000-4000-8000-000000000053" data-name="headline" data-role="headline" opacity="1" text-anchor="start" font-family="Arial" font-size="60" font-weight="700" font-style="normal" fill="#101418">
